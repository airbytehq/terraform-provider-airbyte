# GoReleaser configuration for pre-releases.
#
# This is a variant of .goreleaser.yml used by the pre-release workflow.
# Differences from the production config:
#   - release.draft = false   (immediately visible, not a draft)
#   - release.prerelease removed (the semver pre-release suffix in the tag is
#     enough for Terraform Registry to treat it as non-default; setting the
#     GitHub "pre-release" flag would actually prevent the Registry from syncing)
#   - release.use_existing_draft removed (creates a new release)
#   - changelog.disable removed (includes auto-generated changelog)
#
# Do NOT use this config for stable releases — use .goreleaser.yml via the
# Release Drafter workflow instead.

version: 2

before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'
archives:
  - format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256
signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
release:
  draft: false
  replace_existing_artifacts: true
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
