workflowVersion: 1.0.0
# Pinned to a specific version so PRs aren't disrupted mid-flight by upstream releases.
# Bumped automatically by .github/workflows/bump-speakeasy.yml; see also .github/dependabot.yml.
speakeasyVersion: 1.761.11
sources:
    airbyte-api:
        inputs:
            - location: ./generated/api_terraform.yaml
        overlays:
            - location: ./overlays/terraform_speakeasy.yaml
        registry:
            location: registry.speakeasyapi.dev/airbyte/airbyte-prod/my-source
targets:
    terraform-provider-airbyte:
        target: terraform
        source: airbyte-api
