workflowVersion: 1.0.0
# `pinned` tells the Speakeasy CLI to use whatever version is currently installed
# without attempting a blue/green auto-upgrade. The actual version is pinned in
# .github/speakeasy/Dockerfile and bumped by Dependabot's `docker` ecosystem.
# https://www.speakeasy.com/docs/speakeasy-reference/workflow-file#speakeasy-version
speakeasyVersion: pinned
sources:
    airbyte-api:
        inputs:
            - location: ./generated/api_terraform.yaml
        overlays:
            - location: ./overlays/terraform_speakeasy.yaml
        registry:
            location: registry.speakeasyapi.dev/airbyte/airbyte-prod/my-source
targets:
    terraform-provider-airbyte:
        target: terraform
        source: airbyte-api
