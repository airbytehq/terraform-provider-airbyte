# E2E Smoke Test — runs the CI-built provider binary against Airbyte Cloud
#
# This workflow validates the provider end-to-end by:
# 1. Downloading the CI-built provider binary
# 2. Configuring a dev override so Terraform uses it instead of the registry version
# 3. Running terraform init/plan/apply against test-projects/v1-tf-generic-test/
# 4. Running a second plan to assert zero drift (the key assertion)
# 5. Destroying all resources to clean up
#
# Triggers:
# - workflow_call: invoked by test-full.yml after provider binaries are built
# - workflow_dispatch: for manual runs (downloads the latest provider_binaries artifact)

name: E2E Smoke Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  e2e-smoke-test:
    name: E2E Smoke Test (v1-tf-generic-test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: e2e-smoke-test-v1
      cancel-in-progress: false
    defaults:
      run:
        working-directory: test-projects/v1-tf-generic-test
    env:
      TF_VAR_airbyte_client_id: ${{ secrets.AIRBYTE_CLIENT_ID }}
      TF_VAR_airbyte_client_secret: ${{ secrets.AIRBYTE_CLIENT_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Download provider binary artifact
        uses: actions/download-artifact@v4
        with:
          name: provider_binaries
          path: /tmp/provider-bin

      - name: Configure provider dev override
        run: |
          mkdir -p provider-override
          cp /tmp/provider-bin/terraform-provider-airbyte_linux_amd64 provider-override/terraform-provider-airbyte
          chmod +x provider-override/terraform-provider-airbyte

          OVERRIDE_DIR="$(pwd)/provider-override"
          cat > "$HOME/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "airbytehq/airbyte" = "${OVERRIDE_DIR}"
            }
            direct {}
          }
          EOF

          echo "Provider binary:"
          ls -lh provider-override/terraform-provider-airbyte
          echo "Terraform RC:"
          cat "$HOME/.terraformrc"

      # Note: 'terraform init' is skipped when using dev_overrides — Terraform
      # prints a warning and proceeds without downloading the provider. We still
      # run it to initialise the working directory and any backend configuration.
      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Terraform Plan (drift check)
        id: drift-check
        run: |
          terraform plan -detailed-exitcode -out=tfplan-drift 2>&1 | tee plan_output.txt
          PLAN_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$PLAN_EXIT_CODE" -eq 0 ]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "✅ No drift detected — plan is clean."
          elif [ "$PLAN_EXIT_CODE" -eq 2 ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "❌ Drift detected — plan shows changes after apply."
            cat plan_output.txt
            exit 1
          else
            echo "drift=error" >> "$GITHUB_OUTPUT"
            echo "❌ Terraform plan failed with exit code $PLAN_EXIT_CODE."
            cat plan_output.txt
            exit 1
          fi

      - name: Terraform Destroy
        if: always()
        run: terraform destroy -auto-approve
