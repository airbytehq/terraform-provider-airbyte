# Bump Speakeasy Version
#
# Dependabot does not have a native ecosystem for .speakeasy/workflow.yaml, so this
# workflow takes the same role for the pinned `speakeasyVersion`:
#
# 1. Looks up the latest Speakeasy release on GitHub.
# 2. Compares it to the pinned version in `.speakeasy/workflow.yaml`.
# 3. If different, updates the pin and opens a PR.
#
# The follow-up "Generate TF Provider" workflow (or `/generate` slash command)
# regenerates the SDK against the new pin.

name: Bump Speakeasy Version

"on":
    schedule:
        # Weekly on Mondays at 6 AM UTC, matching dependabot's weekly cadence.
        - cron: '0 6 * * 1'
    workflow_dispatch:
        inputs:
            target_version:
                description: 'Speakeasy version to pin (without leading "v"). Leave empty to use the latest release.'
                type: string
                required: false

permissions:
    contents: read

jobs:
    bump:
        name: Bump pinned Speakeasy version
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Resolve target Speakeasy version
              id: resolve
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REQUESTED: ${{ inputs.target_version }}
              run: |
                  set -euo pipefail
                  CURRENT=$(awk '/^speakeasyVersion:/ {print $2}' .speakeasy/workflow.yaml)
                  if [ -n "$REQUESTED" ]; then
                      TARGET="${REQUESTED#v}"
                  else
                      TAG=$(gh api repos/speakeasy-api/speakeasy/releases/latest --jq .tag_name)
                      TARGET="${TAG#v}"
                  fi
                  echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "target=$TARGET" >> "$GITHUB_OUTPUT"
                  if [ "$CURRENT" = "$TARGET" ]; then
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                      echo "Already pinned to $CURRENT — nothing to do."
                  else
                      echo "changed=true" >> "$GITHUB_OUTPUT"
                      echo "Bump $CURRENT -> $TARGET"
                  fi

            - name: Update pinned version in .speakeasy/workflow.yaml
              if: steps.resolve.outputs.changed == 'true'
              env:
                  TARGET: ${{ steps.resolve.outputs.target }}
              run: |
                  set -euo pipefail
                  python3 - <<'PY'
                  import os
                  import re
                  from pathlib import Path

                  target = os.environ["TARGET"]
                  path = Path(".speakeasy/workflow.yaml")
                  text = path.read_text()
                  new_text, count = re.subn(
                      r"^speakeasyVersion: .*$",
                      f"speakeasyVersion: {target}",
                      text,
                      count=1,
                      flags=re.MULTILINE,
                  )
                  if count != 1:
                      raise SystemExit("Could not find speakeasyVersion line to update")
                  path.write_text(new_text)
                  PY

            - name: Authenticate as GitHub App
              if: steps.resolve.outputs.changed == 'true'
              uses: actions/create-github-app-token@v2
              id: get-pr-token
              with:
                  app-id: ${{ secrets.OCTAVIA_BOT_APP_ID }}
                  private-key: ${{ secrets.OCTAVIA_BOT_PRIVATE_KEY }}

            - name: Open or update bump PR
              if: steps.resolve.outputs.changed == 'true'
              uses: peter-evans/create-pull-request@v6
              with:
                  token: ${{ steps.get-pr-token.outputs.token }}
                  commit-message: "ci(speakeasy): bump pinned version to ${{ steps.resolve.outputs.target }}"
                  title: "ci(speakeasy): bump pinned version to ${{ steps.resolve.outputs.target }}"
                  body: |
                      Bumps the pinned Speakeasy version in `.speakeasy/workflow.yaml`
                      from `${{ steps.resolve.outputs.current }}` to `${{ steps.resolve.outputs.target }}`.

                      Release notes: https://github.com/speakeasy-api/speakeasy/releases/tag/v${{ steps.resolve.outputs.target }}

                      After this PR is merged (or while it is open), comment `/generate`
                      on a PR — or wait for the daily generation job — to regenerate the
                      SDK against the new Speakeasy version.
                  branch: bump-speakeasy-version
                  base: main
                  delete-branch: true
                  labels: |
                      dependencies
                      speakeasy
