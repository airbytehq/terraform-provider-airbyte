# Dependabot configuration for terraform-provider-airbyte.
#
# Note: dependabot does not natively understand .speakeasy/workflow.yaml, so the
# pinned `speakeasyVersion` in that file is bumped by .github/workflows/bump-speakeasy.yml
# instead. This file covers the standard ecosystems supported by dependabot.

version: 2
updates:
  # GitHub Actions used in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  # Go module dependencies (go.mod / go.sum)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - go
