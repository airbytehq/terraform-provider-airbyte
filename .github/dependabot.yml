# Dependabot configuration for terraform-provider-airbyte.
#
# `.speakeasy/workflow.yaml` uses `speakeasyVersion: pinned`, so the actual CLI
# version is pinned in `.github/speakeasy/Dockerfile` and bumped by the docker
# ecosystem entry below.

version: 2
updates:
  # Speakeasy CLI version pin (FROM line in .github/speakeasy/Dockerfile).
  # See .github/speakeasy/Dockerfile for the full explanation.
  - package-ecosystem: docker
    directory: /.github/speakeasy
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci(speakeasy)
    labels:
      - dependencies
      - speakeasy

  # GitHub Actions used in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  # Go module dependencies (go.mod / go.sum)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - go
